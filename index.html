<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Entered Data</h1>
    <table border="1"width="80%" >
        <thead>
        <tr>
            <th>ID</th>
            <th>first Name</th>
            <th>last Name</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>
        </thead>
        <tbody id="input-el">
            <tr>

            </tr>
        </tbody>
    </table>
    <script >
        const inputEl=document.getElementById("input-el")
        var Fname=new Array(3)
        var lname=new Array(3)
        var department=new Array(3)
        var salary= new Array(3) 
        var id=new Array(3)

        for(var i=0; i<id.length;i++){
            id[i]=i+1
            Fname[i]=prompt("enter your first name","Mugabo")
            lname[i]=prompt("enter your last name","justin")
            department[i] = prompt("enter your department","Maintainance")
            salary [i]= prompt("enter salary","30000")
        }

        for(var i=0;i<id.length;i++){
            var res=`<td>${id[i]}</td>
                <td>${Fname[i]}</td>
                <td>${lname[i]}</td>
                <td>${department[i]}</td>
                <td>${salary[i]}</td>`
            inputEl.innerHTML += res
        }



    </script>
</body>
</html>
